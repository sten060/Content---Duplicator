<svg width="120" height="40" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="zenoGradient" x1="0" y1="0" x2="120" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- symbole infini stylisé -->
  <path filter="url(#glow)" d="M20 20c5-10 15-10 20 0s15 10 20 0" stroke="url(#zenoGradient)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- texte -->
  <text x="60" y="25" font-family="Poppins, sans-serif" font-weight="600" font-size="16" fill="url(#zenoGradient)">Zeno Studio</text>
</svg>